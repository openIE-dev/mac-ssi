<!doctype html><html><head><meta charset=utf-8><style>
*{margin:0;box-sizing:border-box;font-family:-apple-system,'Inter','Segoe UI',sans-serif}
body{width:1920px;height:1080px;overflow:hidden;background:radial-gradient(1400px 800px at 70% -10%,#16203a,#0a0d14 60%);color:#e8edf6;display:flex;align-items:center;justify-content:center}
.grad{background:linear-gradient(120deg,#3b9dff,#9a6bff);-webkit-background-clip:text;background-clip:text;color:transparent}
.wrap{width:1500px;text-align:center}
h1{font-size:96px;font-weight:850;letter-spacing:-.03em;line-height:1.05}
.eyebrow{color:#9a6bff;font-weight:800;font-size:26px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:28px}
.sub{font-size:38px;color:#93a1bd;margin-top:34px;line-height:1.4}
.term{background:#0b0f1a;border:1px solid #1e2738;border-radius:20px;text-align:left;box-shadow:0 50px 140px -40px #000;overflow:hidden}
.bar{display:flex;gap:11px;padding:20px 24px;border-bottom:1px solid #1e2738}
.bar i{width:17px;height:17px;border-radius:50%;display:inline-block}
.bar i:nth-child(1){background:#ff5f57}.bar i:nth-child(2){background:#febc2e}.bar i:nth-child(3){background:#28c840}
pre{padding:36px 40px;font-family:'SF Mono',Menlo,monospace;font-size:34px;line-height:1.65;color:#cfe0ff;white-space:pre-wrap}
.c{color:#6b7a99}.g{color:#7ee787}.k{color:#9a6bff}.s{color:#79c0ff}.o{color:#ffa657}
img.bleed{width:1500px;border-radius:24px;border:1px solid #1e2738;box-shadow:0 50px 140px -40px #000}
.cap{position:absolute;bottom:90px;left:0;right:0;text-align:center;font-size:44px;font-weight:700}
.stat{font-size:150px;font-weight:850;letter-spacing:-.03em}
.logo{width:120px;height:120px;margin:0 auto 30px;display:block}
