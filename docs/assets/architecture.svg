<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 460" font-family="-apple-system,Segoe UI,Inter,sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b9dff"/><stop offset="1" stop-color="#9a6bff"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b9dff"/><stop offset="1" stop-color="#9a6bff"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="980" height="460" rx="16" fill="#0b0f1a"/>
  <text x="40" y="46" fill="#93a1bd" font-size="13" letter-spacing="2" font-weight="700">PIPELINE-SHARDED ACROSS THE CLUSTER · ONE OPENAI ENDPOINT</text>

  <!-- prompt in -->
  <text x="40" y="240" fill="#6b7a99" font-size="13">prompt</text>
  <line x1="40" y1="252" x2="120" y2="252" stroke="url(#flow)" stroke-width="3"/>
  <polygon points="120,247 132,252 120,257" fill="#3b9dff"/>

  <!-- 4 node cards -->
  <g>
    <!-- node template repeated -->
    <g transform="translate(140,150)">
      <rect width="160" height="200" rx="14" fill="#121826" stroke="#27324a"/>
      <rect x="0" y="0" width="160" height="36" rx="14" fill="#0e1422"/>
      <text x="16" y="24" fill="#e8edf6" font-size="14" font-weight="700">Mac · 256 GB</text>
      <text x="16" y="60" fill="#6b7a99" font-size="11">layers 1–27</text>
      <g fill="url(#g)" opacity="0.9">
        <rect x="16" y="74" width="128" height="14" rx="4"/>
        <rect x="16" y="94" width="128" height="14" rx="4"/>
        <rect x="16" y="114" width="128" height="14" rx="4"/>
        <rect x="16" y="134" width="128" height="14" rx="4"/>
        <rect x="16" y="154" width="128" height="14" rx="4" opacity=".6"/>
        <rect x="16" y="174" width="90" height="14" rx="4" opacity=".4"/>
      </g>
    </g>
    <g transform="translate(330,150)">
      <rect width="160" height="200" rx="14" fill="#121826" stroke="#27324a"/>
      <rect x="0" y="0" width="160" height="36" rx="14" fill="#0e1422"/>
      <text x="16" y="24" fill="#e8edf6" font-size="14" font-weight="700">Mac · 128 GB</text>
      <text x="16" y="60" fill="#6b7a99" font-size="11">layers 28–54</text>
      <g fill="url(#g)" opacity="0.9">
        <rect x="16" y="74" width="128" height="14" rx="4"/>
        <rect x="16" y="94" width="128" height="14" rx="4"/>
        <rect x="16" y="114" width="128" height="14" rx="4"/>
        <rect x="16" y="134" width="100" height="14" rx="4" opacity=".6"/>
      </g>
    </g>
    <g transform="translate(520,150)">
      <rect width="160" height="200" rx="14" fill="#121826" stroke="#27324a"/>
      <rect x="0" y="0" width="160" height="36" rx="14" fill="#0e1422"/>
      <text x="16" y="24" fill="#e8edf6" font-size="14" font-weight="700">Mac · 128 GB</text>
      <text x="16" y="60" fill="#6b7a99" font-size="11">layers 55–81</text>
      <g fill="url(#g)" opacity="0.9">
        <rect x="16" y="74" width="128" height="14" rx="4"/>
        <rect x="16" y="94" width="128" height="14" rx="4"/>
        <rect x="16" y="114" width="128" height="14" rx="4"/>
        <rect x="16" y="134" width="100" height="14" rx="4" opacity=".6"/>
      </g>
    </g>
    <g transform="translate(710,150)">
      <rect width="160" height="200" rx="14" fill="#121826" stroke="#27324a"/>
      <rect x="0" y="0" width="160" height="36" rx="14" fill="#0e1422"/>
      <text x="16" y="24" fill="#e8edf6" font-size="14" font-weight="700">Mac · 96 GB</text>
      <text x="16" y="60" fill="#6b7a99" font-size="11">layers 82–108 + head</text>
      <g fill="url(#g)" opacity="0.9">
        <rect x="16" y="74" width="128" height="14" rx="4"/>
        <rect x="16" y="94" width="128" height="14" rx="4"/>
        <rect x="16" y="114" width="100" height="14" rx="4" opacity=".6"/>
      </g>
    </g>
  </g>

  <!-- Thunderbolt links between nodes (activations relay) -->
  <g stroke="url(#flow)" stroke-width="3" filter="url(#glow)">
    <line x1="300" y1="250" x2="330" y2="250"/>
    <line x1="490" y1="250" x2="520" y2="250"/>
    <line x1="680" y1="250" x2="710" y2="250"/>
  </g>
  <g fill="#9a6bff">
    <polygon points="324,245 336,250 324,255"/>
    <polygon points="514,245 526,250 514,255"/>
    <polygon points="704,245 716,250 704,255"/>
  </g>
  <text x="490" y="372" fill="#6b7a99" font-size="11" text-anchor="middle">Thunderbolt 5 fabric · ~tens of KB activations / token</text>

  <!-- endpoint out -->
  <line x1="870" y1="250" x2="918" y2="250" stroke="url(#flow)" stroke-width="3"/>
  <rect x="888" y="120" width="72" height="36" rx="9" fill="#0e1422" stroke="#27324a"/>
  <text x="924" y="143" fill="#7ee787" font-size="12" text-anchor="middle" font-weight="700">/v1</text>
  <line x1="924" y1="156" x2="924" y2="232" stroke="#27324a" stroke-width="2" stroke-dasharray="3 4"/>

  <!-- footer stat -->
  <text x="40" y="430" fill="#3b9dff" font-size="14" font-weight="700">608 GB pooled</text>
  <text x="160" y="430" fill="#6b7a99" font-size="13">one model, too big for any single Mac, running across all of them</text>
</svg>
